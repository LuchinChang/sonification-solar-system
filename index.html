<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Solar System Sonification</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  

  <body class="ui-hidden">

    <!-- ══ Audio-init overlay — browser policy requires user gesture ══ -->
    <div id="audio-overlay">
      <button id="start-engine-btn" type="button">
        <span class="engine-icon" aria-hidden="true">&#x25C9;</span>
        <span class="engine-label">Start Engine</span>
        <span class="engine-hint">Enable audio synthesis</span>
      </button>
      <p class="signature">Solar System Sonification</p>
    </div>

    <!-- ══ Draw-animation caption bar ══ -->
    <div id="draw-caption" class="draw-caption hidden" aria-live="polite"></div>

    <!-- ══ Pattern-ready toast ══ -->
    <div id="pattern-toast" class="pattern-toast hidden"></div>

    <!-- ══ Intro Tour overlay — first-time guided walkthrough ══ -->
    <div id="intro-tour" class="hidden" aria-label="Introduction tour">
      <div id="intro-scrim"></div>
      <div id="intro-spotlight"></div>
      <div id="intro-tooltip">
        <span id="intro-step-counter" class="intro-step-counter"></span>
        <p id="intro-text" class="intro-text"></p>
        <div id="intro-actions" class="intro-actions">
          <button id="intro-got-it" class="intro-got-it hidden" type="button">Got it</button>
        </div>
        <button id="intro-skip" class="intro-skip" type="button">Skip tour</button>
      </div>
    </div>

    <!-- ══ Orbital canvas — driven entirely by main.ts ══ -->
    <canvas id="simCanvas"></canvas>

    <!-- ╔════════════════════════════════════════════════════════╗ -->
    <!-- ║            BOTTOM DOCK  (D key toggles)               ║ -->
    <!-- ║  Left section: shape spawner  |  Right: knob control  ║ -->
    <!-- ╚════════════════════════════════════════════════════════╝ -->
    <aside id="foundry-panel" aria-label="Sonic Foundry and Orbital Engine">

      <!-- ── Left: Shape Spawner ── -->
      <section class="dock-section" id="foundry-shapes-section">
        <header class="dock-header">
          <span class="dock-icon" aria-hidden="true">◈</span>
          <span class="dock-title">Sonic Foundry</span>
        </header>
        <div class="dock-divider"></div>
        <div id="foundry-shapes" class="foundry-shapes" role="toolbar" aria-label="Spawn shapes">

          <button
            class="shape-tile"
            data-shape="circle"
            title="Spawn Circle at Sun"
            aria-label="Spawn Circle"
          >
            <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <circle cx="16" cy="16" r="11" stroke="currentColor" stroke-width="1.5" />
            </svg>
            <span class="shape-label">Circle</span>
          </button>

          <button
            class="shape-tile"
            data-shape="triangle"
            title="Spawn Triangle at Sun"
            aria-label="Spawn Triangle"
          >
            <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <polygon points="16,4 28,27 4,27" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" />
            </svg>
            <span class="shape-label">Triangle</span>
          </button>

          <button
            class="shape-tile"
            data-shape="rectangle"
            title="Spawn Rectangle at Sun"
            aria-label="Spawn Rectangle"
          >
            <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <rect x="3" y="9" width="26" height="14" rx="2" stroke="currentColor" stroke-width="1.5" />
            </svg>
            <span class="shape-label">Rect</span>
          </button>

          <button
            class="shape-tile"
            data-shape="sweeper"
            title="Spawn Sweeper at Sun"
            aria-label="Spawn Sweeper"
          >
            <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <circle cx="16" cy="16" r="10" stroke="currentColor" stroke-width="0.75" stroke-dasharray="3 4"/>
              <line x1="16" y1="16" x2="26" y2="9" stroke="currentColor" stroke-width="1.5"/>
              <circle cx="23.5" cy="10.5" r="2.5" stroke="currentColor" stroke-width="1.2"/>
              <circle cx="16" cy="16" r="2" fill="currentColor"/>
            </svg>
            <span class="shape-label">Sweep</span>
          </button>

        </div>
        <p class="dock-hint">Click to spawn &nbsp;&middot;&nbsp; Click canvas shape to select &nbsp;&middot;&nbsp; Scroll to resize</p>
      </section>

      <!-- Vertical separator -->
      <div class="section-sep" aria-hidden="true"></div>

      <!-- ── Right: Orbital Engine ── -->
      <section class="dock-section" id="controls-section">
        <header class="dock-header">
          <span class="dock-icon" aria-hidden="true">◉</span>
          <span class="dock-title">Orbital Engine</span>
        </header>
        <div class="dock-divider"></div>

        <!-- Two knobs side-by-side: Sample Rate + CPM -->
        <div class="knobs-row">

          <!-- Sample Rate knob (existing) -->
          <div class="knob-container">
            <svg
              id="sample-knob"
              viewBox="0 0 56 56"
              xmlns="http://www.w3.org/2000/svg"
              role="slider"
              aria-label="Sample rate"
              aria-valuemin="50"
              aria-valuemax="2000"
              aria-valuenow="500"
              tabindex="0"
            >
              <circle cx="28" cy="28" r="22" class="knob-track" />
              <g id="knob-needle-group">
                <line x1="28" y1="28" x2="28" y2="9" class="knob-needle-line" />
                <circle cx="28" cy="9" r="2.5" class="knob-needle-dot" />
              </g>
              <circle cx="28" cy="28" r="7" class="knob-hub" />
            </svg>
            <div class="knob-readout">
              <span id="knob-value">500</span>
              <span class="knob-unit">Samples / Orbit</span>
            </div>
          </div>

          <!-- CPM knob (new) -->
          <div class="knob-container">
            <svg
              id="cpm-knob"
              viewBox="0 0 56 56"
              xmlns="http://www.w3.org/2000/svg"
              role="slider"
              aria-label="Cycles per minute"
              aria-valuemin="30"
              aria-valuemax="240"
              aria-valuenow="60"
              tabindex="0"
            >
              <circle cx="28" cy="28" r="22" class="knob-track" />
              <g id="cpm-needle-group">
                <line x1="28" y1="28" x2="28" y2="9" class="knob-needle-line" />
                <circle cx="28" cy="9" r="2.5" class="knob-needle-dot" />
              </g>
              <circle cx="28" cy="28" r="7" class="knob-hub" />
            </svg>
            <div class="knob-readout">
              <span id="cpm-value">60</span>
              <span class="knob-unit">Cycles / Min</span>
            </div>
          </div>

        </div><!-- /knobs-row -->

        <!-- Mode toggle + Play/Pause -->
        <div class="sequencer-controls">

          <!--
            Pill toggle: clicking either option calls setPlaybackMode().
            JS manages the .active class on each .mode-option.
          -->
          <div
            class="mode-toggle"
            id="mode-toggle"
            role="group"
            aria-label="Playback mode"
          >
            <span class="mode-option active" data-mode="constant-time"  title="All shapes complete one loop in the same time">Const T</span>
            <span class="mode-option"        data-mode="constant-speed" title="Larger shapes take longer (fixed linear speed)">Const V</span>
          </div>

          <!-- Play / Pause button -->
          <button
            id="play-pause-btn"
            class="play-btn playing"
            aria-label="Pause playback"
            title="Play / Pause  [ Space ]"
          >⏸</button>

          <!-- Theme toggle (Martian Dusk ↔ Daylight) -->
          <button
            id="theme-toggle"
            class="theme-toggle-btn"
            aria-label="Switch to Daylight"
            title="Daylight theme"
          >☀</button>

          <!-- Save / Load config -->
          <button
            id="save-config-btn"
            class="config-btn"
            aria-label="Save configuration"
            title="Save config  [ ⌘S ]"
          >⬇</button>
          <button
            id="load-config-btn"
            class="config-btn"
            aria-label="Load configuration"
            title="Load config"
          >⬆</button>
          <input id="load-config-input" type="file" accept=".json" style="display:none" />

        </div><!-- /sequencer-controls -->

        <p class="dock-hint">⌘ / Ctrl + Scroll → Samples  |  ⌘S → Save</p>
      </section>

    </aside>

    <!-- ╔════════════════════════════════════════════════════════╗ -->
    <!-- ║    LIVE CODE TELEMETRY PANEL  (I key toggles)         ║ -->
    <!-- ╚════════════════════════════════════════════════════════╝ -->
    <!--
      Slides in from the right.
      .collapsed = translateX(100% - 36px), only the tab is visible.
      JS also hooks the tab button click + I keydown.
    -->
    <div id="telemetry-panel" class="collapsed" role="complementary" aria-label="Live code telemetry">

      <!-- Handle tab — always visible on the right edge -->
      <button class="telemetry-tab" id="telemetry-tab" title="Toggle Live Code  [ i ]" aria-expanded="false">
        <span aria-hidden="true">{ }</span>
      </button>

      <!-- Content pane -->
      <div class="telemetry-inner">
        <header class="telemetry-header">
          <span class="telemetry-title">Live Code</span>
          <span id="eval-status" class="eval-status" aria-live="polite"></span>
          <kbd class="telemetry-kbd" title="Toggle panel">i</kbd>
        </header>
        <textarea
          id="telemetry-code"
          spellcheck="false"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          aria-label="Strudel live code editor"
        >// Spawn shapes from the dock below.
// Select a shape to assign a sound category.</textarea>
        <footer class="telemetry-footer">
          <kbd class="telemetry-kbd">&#x2318;/Ctrl + Enter</kbd>
          <span class="footer-label">evaluate</span>
          <button
            id="sync-audio-btn"
            class="sync-audio-btn"
            title="Sync audio engine (Ctrl+Enter)"
            aria-label="Sync audio"
          >Sync ⟳</button>
        </footer>
      </div>

    </div>

    <!-- Drag-and-drop overlay (shown on dragover canvas) -->
    <div id="drop-overlay" class="hidden">
      <span>Drop config file to restore</span>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
