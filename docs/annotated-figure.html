<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Annotated Figure — Solar System Sonification</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'JetBrains Mono', monospace;
      background: #fff;
      color: #333;
      display: flex;
      justify-content: center;
      padding: 32px 16px;
    }

    .figure-container {
      max-width: 1200px;
      width: 100%;
    }

    .figure-image-wrap {
      position: relative;
      width: 100%;
      line-height: 0;
    }

    .figure-image-wrap img {
      width: 100%;
      height: auto;
      display: block;
      border: 1px solid rgba(92, 58, 33, 0.15);
      border-radius: 6px;
    }

    .figure-image-wrap svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    @media print {
      body { padding: 0; }
      .figure-image-wrap img {
        border: 0.5pt solid #ccc;
        border-radius: 0;
      }
    }
  </style>
</head>
<body>
  <div class="figure-container">
    <div class="figure-image-wrap">
      <img src="../paper materials/App Demo.png"
           alt="Solar System Sonification interface showing Venus-Earth Pentagram pattern with circle and sweeper probes">

      <!--
        SVG annotation overlay
        viewBox = image pixel size 3840 x 2010
        Display ~1200px wide → scale ≈ 0.31x
        So SVG font 30px ≈ 9.4px on screen, 34px ≈ 10.6px
      -->
      <svg viewBox="0 0 3840 2010" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <style>
            .mc { fill: #fff; stroke: #444; stroke-width: 5; }
            .ml {
              font-family: 'JetBrains Mono', monospace;
              font-size: 32px; font-weight: 600; fill: #333;
              text-anchor: middle; dominant-baseline: central;
            }
            .ld { stroke: #555; stroke-width: 2.5; stroke-dasharray: 12 7; }
            .lb {
              fill: rgba(255,255,255,0.94);
              stroke: rgba(80,50,30,0.22);
              stroke-width: 2; rx: 10; ry: 10;
            }
            .lt {
              font-family: 'JetBrains Mono', monospace;
              font-size: 28px; font-weight: 400; fill: #333;
            }
            .lb2 { font-weight: 600; }
          </style>
        </defs>

        <!-- Key positions in the 3840×2010 image:
             Sun center:        ~(1780, 880)
             Circle radius:     ~240 SVG units
             Sweeper top:       ~(1730, 60)
             Instrument panel:  x 30–560, y 300–1100
             Code panel:        x 2880–3840, y 20–1980
             Dock:              x 1050–2750, y 1360–1850
        -->

        <!-- ════════════════════════════════════════
             (A) Pentagram of Venus — upper-left petal
             ════════════════════════════════════════ -->
        <line class="ld" x1="1250" y1="380" x2="500" y2="80" />
        <rect class="lb" x="30" y="28" width="490" height="100" />
        <text class="lt" x="55" y="65">
          <tspan class="lb2">(A)</tspan> Venus–Earth link lines
        </text>
        <text class="lt" x="95" y="105">trace a 5-petaled rose</text>
        <circle class="mc" cx="1250" cy="380" r="30" />
        <text class="ml" x="1250" y="380">A</text>

        <!-- ════════════════════════════════════════
             (B) Circle probe — left edge of circle
             ════════════════════════════════════════ -->
        <line class="ld" x1="1500" y1="690" x2="580" y2="250" />
        <rect class="lb" x="160" y="190" width="440" height="100" />
        <text class="lt" x="185" y="228">
          <tspan class="lb2">(B)</tspan> Circle probe: collisions
        </text>
        <text class="lt" x="225" y="270">encoded as 256-step rhythm</text>
        <circle class="mc" cx="1500" cy="690" r="30" />
        <text class="ml" x="1500" y="690">B</text>

        <!-- ════════════════════════════════════════
             (C) Intersection dots — right side of circle
             ════════════════════════════════════════ -->
        <line class="ld" x1="1960" y1="790" x2="2250" y2="1200" />
        <rect class="lb" x="2260" y="1150" width="380" height="100" />
        <text class="lt" x="2285" y="1188">
          <tspan class="lb2">(C)</tspan> Collision points — each
        </text>
        <text class="lt" x="2325" y="1230">triggers a sound event</text>
        <circle class="mc" cx="1960" cy="790" r="30" />
        <text class="ml" x="1960" y="790">C</text>

        <!-- ════════════════════════════════════════
             (D) Sweeper arm — upper portion of teal line
             ════════════════════════════════════════ -->
        <line class="ld" x1="1740" y1="350" x2="2360" y2="210" />
        <rect class="lb" x="2380" y="145" width="490" height="100" />
        <text class="lt" x="2405" y="183">
          <tspan class="lb2">(D)</tspan> Sweeper probe: rotating ray
        </text>
        <text class="lt" x="2445" y="225">clusters intersections by density</text>
        <circle class="mc" cx="1740" cy="350" r="30" />
        <text class="ml" x="1740" y="350">D</text>

        <!-- ════════════════════════════════════════
             (E) Sun — anchor point
             ════════════════════════════════════════ -->
        <line class="ld" x1="1810" y1="920" x2="2150" y2="1050" />
        <rect class="lb" x="2165" y="1008" width="310" height="65" />
        <text class="lt" x="2190" y="1050">
          <tspan class="lb2">(E)</tspan> Sun (anchor point)
        </text>
        <circle class="mc" cx="1810" cy="920" r="30" />
        <text class="ml" x="1810" y="920">E</text>

        <!-- ════════════════════════════════════════
             (F) Strudel live code panel (right side)
             ════════════════════════════════════════ -->
        <line class="ld" x1="3050" y1="110" x2="3250" y2="50" />
        <rect class="lb" x="3260" y="15" width="430" height="65" />
        <text class="lt" x="3285" y="57">
          <tspan class="lb2">(F)</tspan> Generated Strudel live code
        </text>
        <circle class="mc" cx="3050" cy="110" r="30" />
        <text class="ml" x="3050" y="110">F</text>

        <!-- ════════════════════════════════════════
             (G) Bottom dock — shape spawner + orbital engine
             ════════════════════════════════════════ -->
        <line class="ld" x1="1580" y1="1690" x2="850" y2="1870" />
        <rect class="lb" x="280" y="1830" width="590" height="65" />
        <text class="lt" x="305" y="1872">
          <tspan class="lb2">(G)</tspan> Shape spawner &amp; orbital engine controls
        </text>
        <circle class="mc" cx="1580" cy="1690" r="30" />
        <text class="ml" x="1580" y="1690">G</text>

        <!-- ════════════════════════════════════════
             (H) Instrument selector panel (left)
             ════════════════════════════════════════ -->
        <line class="ld" x1="300" y1="550" x2="150" y2="420" />
        <rect class="lb" x="30" y="370" width="310" height="65" />
        <text class="lt" x="55" y="412">
          <tspan class="lb2">(H)</tspan> Instrument selector
        </text>
        <circle class="mc" cx="300" cy="550" r="30" />
        <text class="ml" x="300" y="550">H</text>

      </svg>
    </div>
  </div>
</body>
</html>
